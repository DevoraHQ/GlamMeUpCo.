<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Search Results | GLAM ME UP CO</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

    <!-- Header -->
    <header class="navbar">

        <div class="logo">
            GLAM ME UP CO
        </div>

    </header>

  <!-- Search Results -->

<section id="shop" class="signature">

    <div class="section-title">

        <h2 id="searchHeading">
            Search Results
        </h2>

        <p id="resultCount"></p>

    </div>


    <!-- Category Filter -->

    <div class="category-filter">

        <button class="category-btn active" data-category="all">
            All
        </button>

        <button class="category-btn" data-category="dress">
            Dresses
        </button>

        <button class="category-btn" data-category="two-piece">
            Two-Piece Sets
        </button>

        <button class="category-btn" data-category="ankara">
            Ankara
        </button>

        <button class="category-btn" data-category="co-ords">
            Co-ords
        </button>

        <button class="category-btn" data-category="accessories">
            Accessories
        </button>

    </div>


    <!-- Products -->

    <div class="product-grid" id="searchResults">

    </div>


    <p id="noResults" style="display:none;">
        No products found.
    </p>

</section>

    <script src="search.js"></script>

</body>

</html>
